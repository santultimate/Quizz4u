name: quizz4u
description: Quiz éducatif avec 5 catégories - Histoire du Mali, Culture générale, Sciences, Mathématiques et Afrique. Plus de 200 questions avec TTS, timer animé et classement local.

version: 2.0.8+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  lottie: ^2.7.0
  shared_preferences: ^2.2.2
  share_plus: ^7.2.1
  flutter_tts: ^4.2.3
  url_launcher: ^6.2.4
  google_mobile_ads: ^6.0.0
  in_app_purchase: ^3.1.13
  audioplayers: ^6.5.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.0
  # UI optionnelle (modern_components.dart non branché) — retirée pour taille
  # google_fonts / cached_network_image / confetti / flutter_svg / http : inutilisés
  # shimmer / animated_text_kit / flutter_staggered_animations : uniquement modern_components

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/translations/fr.json
    - assets/translations/en.json
    - assets/translations/ar.json
    - assets/translations/zh.json
    - assets/translations/hi.json
    - assets/translations/es.json
    - assets/translations/questions_fr.json
    - assets/translations/questions_en.json
    - assets/translations/questions_ar.json
    - assets/sounds/good.mp3
    - assets/sounds/bad.mp3
    - assets/sounds/background.mp3
    - assets/animations/
    # Fichiers de base (dupliqués supprimés - contenus dans enriched_*)
    - assets/questions/math_questions.json
    - assets/questions/africa_questions.json
    - assets/questions/football_questions.json
    - assets/questions/music_questions.json
    - assets/questions/enriched_history_questions.json
    - assets/questions/enriched_culture_questions.json
    - assets/questions/enriched_science_questions.json
    # Expansions actives (12 catégories au total)
